<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#7b2d8e"/>
  <g fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- QR code icon -->
    <rect x="120" y="120" width="100" height="100" rx="12"/>
    <rect x="292" y="120" width="100" height="100" rx="12"/>
    <rect x="120" y="292" width="100" height="100" rx="12"/>
