<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate Singapore PayNow QR codes instantly. Free, offline-capable, no signup required.">
    <meta name="theme-color" content="#7b2d8e">
    <title>PayNow QR Generator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>PayNow QR Generator</h1>
        <p>Generate PayNow QR codes for Singapore payments</p>
      </div>

      <form id="qr-form" novalidate>
        <div class="form-group">
          <label for="uen">UEN<span class="required">*</span></label>
          <input type="text" id="uen" placeholder="e.g. 201812345A" required aria-required="true" autocomplete="off">
          <div class="input-hint">Unique Entity Number for your business</div>
        </div>

        <div class="form-group">
          <label for="amount">Amount <span class="optional">(optional)</span></label>
          <div class="input-with-prefix">
            <span class="prefix">S$</span>
            <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
          </div>
        </div>

        <div class="form-group">
          <label for="expiry">Expiry Date <span class="optional">(optional)</span></label>
          <input type="date" id="expiry">
        </div>

        <div class="form-group">
          <label for="refNumber">Reference Number <span class="optional">(optional)</span></label>
          <input type="text" id="refNumber" placeholder="e.g. INV-2024-001" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="company">Company Name <span class="optional">(optional)</span></label>
          <input type="text" id="company" placeholder="e.g. Acme Pte Ltd" autocomplete="off">
        </div>

        <button type="submit" class="btn btn-primary" id="generate-qr">
          Generate QR Code
        </button>
      </form>

      <div class="message message-success" id="success-message" role="status" aria-live="polite">
        QR Code generated successfully!
      </div>
      <div class="message message-error" id="error-message" role="alert" aria-live="assertive"></div>

      <div class="qr-output" id="qr-output">
        <div class="qr-wrapper">
          <canvas id="qr-canvas"></canvas>
        </div>
        <div class="download-section">
          <select id="qr-size" aria-label="QR code download size">
            <option value="256">256 x 256 px</option>
            <option value="512" selected>512 x 512 px</option>
            <option value="1024">1024 x 1024 px</option>
          </select>
          <button type="button" class="btn btn-success" id="download-qr">
            <svg class="icon-download" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download PNG
          </button>
        </div>
      </div>

      <!-- History -->
      <div class="history-section" id="history-section" style="display:none;">
        <div class="history-header">
          <h2>History</h2>
          <button type="button" class="btn-text" id="clear-history">Clear All</button>
        </div>
        <div id="history-list"></div>
      </div>

      <div class="footer">
        <p>Built for Singapore PayNow &middot; <a href="https://github.com/yapweijun1996/PayNow-QR-Generator" target="_blank" rel="noopener">GitHub</a></p>
      </div>
    </div>

    <script src="./js/paynowqr.min.js"></script>
    <script src="./js/qrious.min.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
